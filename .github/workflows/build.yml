name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk
          pip3 install --upgrade pip
          pip3 install kivy buildozer cython

      - name: Initialize Buildozer
        run: |
          buildozer init

      - name: Configure Buildozer
        run: |
          sed -i 's/title = .*/title = Sagar Assistant/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy,speechrecognition,pyttsx3/' buildozer.spec
          echo "android.permissions = INTERNET, RECORD_AUDIO" >> buildozer.spec

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
